<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QOS ISEAS JV</title>
    
    <meta property="og:title" content="QOS ISEAS JV">
    <meta property="og:description" content="Visit our official website for more information.">
    <meta property="og:image" content="https://raw.githubusercontent.com/Admin-QI7/website/main/1.png">
    <meta property="og:type" content="website">

    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 50px 30px; 
            border-radius: 25px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            border-top: 12px solid #4A2C6D; 
            max-width: 320px;
            width: 100%;
        }
        .logo { width: 140px; margin-bottom: 25px; }
        h1 { color: #4A2C6D; margin: 0 0 10px 0; font-size: 24px; }
        p { color: #777; margin-bottom: 35px; font-size: 16px; }
        .btn { 
            background: linear-gradient(135deg, #4A2C6D, #1976D2); 
            color: white !important; 
            padding: 16px 35px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            display: inline-block;
            box-shadow: 0 5px 15px rgba(74, 44, 109, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="1.png" class="logo">
        <h1>QOS ISEAS JV</h1>
        <p>Official Corporate Portal</p>
        
        <a href="https://www.qosiseas.com" class="btn">Visit Website</a>
    </div>

</body>
</html>
